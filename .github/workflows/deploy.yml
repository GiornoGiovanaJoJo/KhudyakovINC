name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Directory
        run: mkdir -p ~/.ssh

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # Remove broken third-party apt source lists that block package installation
            sudo rm -f /etc/apt/sources.list.d/nodejs.list /etc/apt/sources.list.d/docker.list || true
            sudo apt-get update
            sudo apt-get remove -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin || true
            sudo apt-get install -y git docker.io docker-compose-v2 || sudo apt-get install -y git docker-compose-plugin
            
            # Stop default nginx to free port 80
            sudo systemctl stop nginx || true
            sudo systemctl disable nginx || true
            
            # Start Docker
            sudo systemctl enable docker
            sudo systemctl restart containerd || true
            sudo systemctl start docker || sudo systemctl restart docker || (sudo journalctl -xeu docker.service --no-pager; exit 1)

            # Setup Project
            cd /opt
            if [ ! -d "KhudyakovINC" ]; then
                git clone https://github.com/GiornoGiovanaJoJo/KhudyakovINC.git
                cd KhudyakovINC
            else
                cd KhudyakovINC
                git checkout main
                git reset --hard origin/main
                git pull origin main
            fi

            # Setup Environment Variables
            mkdir -p backend frontend telegram_bot
            
            # Backend ENV
            cat <<EOF > backend/.env
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            YANDEX_GPT_API_KEY=${{ secrets.YANDEX_GPT_API_KEY }}
            YANDEX_GPT_FOLDER_ID=${{ secrets.YANDEX_GPT_FOLDER_ID }}
            EOF
            
            # Telegram Bot ENV
            cat <<EOF > telegram_bot/.env
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            EOF
            
            # Rebuild and restart containers
            sudo docker compose down
            sudo docker compose up -d --build
            
            # Clean up dangling images to save space
            sudo docker image prune -f

            # Perform automated smoke test
            echo "Running automated smoke test..."
            if ! python3 scripts/smoke_test.py; then
                echo "ERROR: Smoke test failed! Printing logs for debugging..."
                sudo docker compose logs --tail=100
                exit 1
            fi
            echo "Smoke test passed! Deployment successful."
