services:
  backend:
    build:
      context: ./backend
      network: host
    container_name: khudyakov-backend
    network_mode: "host"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: khudyakov-frontend
    network_mode: "host"
    environment:
      - NUXT_API_BASE=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  mobile:
    build:
      context: ./mobile
      network: host
    container_name: khudyakov-mobile
    network_mode: "host"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: khudyakov-nginx
    network_mode: "host"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - mobile
    restart: unless-stopped

  telegram_bot:
    build:
      context: ./telegram_bot
      network: host
    container_name: khudyakov-telegram-bot
    network_mode: "host"
    restart: unless-stopped
    env_file:
      - ./telegram_bot/.env
    volumes:
      - ./telegram_bot/chats.json:/app/chats.json
    depends_on:
      - backend
