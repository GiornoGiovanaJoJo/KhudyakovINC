services:
  backend:
    build: ./backend
    container_name: khudyakov-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: khudyakov-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_API_BASE=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: khudyakov-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  telegram_bot:
    build: ./telegram_bot
    container_name: khudyakov-telegram-bot
    restart: unless-stopped
    env_file:
      - ./telegram_bot/.env
    depends_on:
      - backend

volumes:
  backend-data:
